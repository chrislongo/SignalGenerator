<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signal Generator — Frequency Input Mockup</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Anybody:wght@700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a1a1c;
    color: #b8b4a8;
    font-family: 'Space Mono', monospace;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    gap: 60px;
    padding: 40px;
    min-height: 100vh;
    flex-wrap: wrap;
  }

  .state-label {
    font-family: 'Anybody', sans-serif;
    font-weight: 800;
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #4e4e4a;
    text-align: center;
    margin-bottom: 16px;
  }

  .state-label span {
    color: #f0982c;
  }

  .phone-frame {
    width: 320px;
    flex-shrink: 0;
  }

  /* ─── CRT Display Container ─── */
  .display {
    background: #080c06;
    border-radius: 10px;
    border: 3px solid #1a1a1c;
    overflow: hidden;
    position: relative;
    box-shadow:
      0 4px 16px rgba(0,0,0,0.6),
      inset 0 1px 0 rgba(255,255,255,0.02);
  }

  .display::after {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 3px,
      rgba(0,0,0,0.08) 3px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    border-radius: 10px;
  }

  /* Curvature highlight */
  .display::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 120px; height: 120px;
    background: radial-gradient(circle at top left, rgba(255,255,255,0.025), transparent);
    pointer-events: none;
    z-index: 2;
  }

  /* ─── Waveform Area ─── */
  .waveform-area {
    height: 120px;
    position: relative;
    overflow: hidden;
  }

  .waveform-area canvas {
    width: 100%;
    height: 100%;
  }

  /* ─── Readout ─── */
  .readout {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    padding: 10px 14px 12px;
    border-top: 1px solid #1a1e14;
  }

  .readout-left {}

  .freq-display {
    display: flex;
    align-items: baseline;
    gap: 4px;
    cursor: pointer;
    transition: filter 0.15s;
  }

  .freq-display:hover {
    filter: brightness(1.2);
  }

  .freq-value {
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    font-size: 34px;
    color: #f0982c;
    text-shadow: 0 0 12px rgba(240,152,44,0.4);
    line-height: 1;
  }

  .freq-unit {
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    font-size: 14px;
    color: rgba(240,152,44,0.4);
  }

  .note {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: rgba(72,200,216,0.75);
    text-shadow: 0 0 6px rgba(72,200,216,0.3);
    margin-top: 3px;
  }

  .readout-right {
    text-align: right;
  }

  .waveform-label {
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    font-size: 13px;
    color: #48c8d8;
    text-shadow: 0 0 6px rgba(72,200,216,0.4);
  }

  .vol-label {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: rgba(240,152,44,0.4);
    margin-top: 3px;
  }

  /* ─── Tap hint ─── */
  .tap-hint {
    position: absolute;
    bottom: -28px;
    left: 14px;
    font-family: 'Anybody', sans-serif;
    font-size: 9px;
    letter-spacing: 2px;
    color: #4e4e4a;
    text-transform: uppercase;
  }

  .tap-hint::before {
    content: '^ ';
    color: #f0982c;
  }

  /* ─── INPUT MODE ─── */
  .display.input-mode .waveform-area {
    display: none;
  }

  .display.input-mode .readout {
    display: none;
  }

  /* ─── Frequency Input Panel ─── */
  .freq-input-panel {
    display: flex;
    flex-direction: column;
    padding: 0;
  }

  /* Input field area */
  .input-field-area {
    padding: 14px 14px 10px;
    border-bottom: 1px solid #1a1e14;
  }

  .input-row {
    display: flex;
    align-items: baseline;
    gap: 2px;
  }

  .input-value {
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    font-size: 38px;
    color: #f0982c;
    text-shadow: 0 0 14px rgba(240,152,44,0.5);
    line-height: 1;
    min-width: 40px;
  }

  .input-cursor {
    display: inline-block;
    width: 3px;
    height: 36px;
    background: #f0982c;
    animation: blink 0.8s step-end infinite;
    vertical-align: baseline;
    margin-left: 2px;
    box-shadow: 0 0 8px rgba(240,152,44,0.6);
  }

  @keyframes blink {
    50% { opacity: 0; }
  }

  .input-hint {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: rgba(72,200,216,0.5);
    margin-top: 6px;
    letter-spacing: 0.5px;
  }

  /* ─── Keypad ─── */
  .keypad {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 5px;
    padding: 8px 10px 10px;
  }

  .key {
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    font-size: 16px;
    color: #b8b4a8;
    background: #383838;
    border: none;
    border-radius: 6px;
    padding: 12px 0;
    text-align: center;
    cursor: pointer;
    position: relative;
    transition: all 0.06s ease-out;
    user-select: none;
    box-shadow: 0 2px 0 #1a1a1c;
  }

  .key:hover {
    background: #424242;
  }

  .key:active {
    transform: translateY(2px);
    box-shadow: 0 0 0 #1a1a1c;
  }

  /* Cancel key */
  .key.cancel {
    color: #6e6e68;
    font-size: 13px;
  }

  /* Backspace */
  .key.backspace {
    color: #6e6e68;
    font-size: 18px;
  }

  /* Hz / kHz confirm keys */
  .key.confirm-hz {
    background: rgba(240,152,44,0.15);
    color: #f0982c;
    font-size: 13px;
    font-weight: 700;
    border: 1px solid rgba(240,152,44,0.2);
    text-shadow: 0 0 8px rgba(240,152,44,0.3);
  }

  .key.confirm-hz:hover {
    background: rgba(240,152,44,0.22);
  }

  .key.confirm-khz {
    background: rgba(240,152,44,0.08);
    color: rgba(240,152,44,0.7);
    font-size: 13px;
    font-weight: 700;
    border: 1px solid rgba(240,152,44,0.1);
  }

  .key.confirm-khz:hover {
    background: rgba(240,152,44,0.15);
  }

  /* ─── Arrow indicator ─── */
  .arrow {
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 20px 0;
  }

  .arrow svg {
    width: 40px;
    height: 40px;
    color: #4e4e4a;
  }

  /* ─── Column wrapper ─── */
  .column {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .display-wrapper {
    position: relative;
    margin-bottom: 36px;
  }
</style>
</head>
<body>

<!-- ════════ STATE 1: Normal Display ════════ -->
<div class="column">
  <div class="state-label">Normal — <span>tap frequency to edit</span></div>
  <div class="phone-frame">
    <div class="display-wrapper">
      <div class="display" id="normalDisplay">
        <div class="waveform-area">
          <canvas id="waveCanvas1"></canvas>
        </div>
        <div class="readout">
          <div class="readout-left">
            <div class="freq-display">
              <span class="freq-value">440</span>
              <span class="freq-unit">Hz</span>
            </div>
            <div class="note">A4</div>
          </div>
          <div class="readout-right">
            <div class="waveform-label">SINE</div>
            <div class="vol-label">VOL 50%</div>
          </div>
        </div>
      </div>
      <div class="tap-hint">tap to enter frequency</div>
    </div>
  </div>
</div>

<!-- ════════ STATE 2: Input Mode ════════ -->
<div class="column">
  <div class="state-label">Input mode — <span>type frequency</span></div>
  <div class="phone-frame">
    <div class="display-wrapper">
      <div class="display input-mode">
        <div class="waveform-area">
          <canvas id="waveCanvas2"></canvas>
        </div>
        <div class="readout">
          <div class="readout-left">
            <div class="freq-display">
              <span class="freq-value">440</span>
              <span class="freq-unit">Hz</span>
            </div>
            <div class="note">A4</div>
          </div>
          <div class="readout-right">
            <div class="waveform-label">SINE</div>
            <div class="vol-label">VOL 50%</div>
          </div>
        </div>

        <!-- Input panel -->
        <div class="freq-input-panel">
          <div class="input-field-area">
            <div class="input-row">
              <span class="input-value">1200</span>
              <span class="input-cursor"></span>
            </div>
            <div class="input-hint">10 — 20000 Hz</div>
          </div>

          <div class="keypad">
            <button class="key">1</button>
            <button class="key">2</button>
            <button class="key">3</button>
            <button class="key backspace">&#x232B;</button>

            <button class="key">4</button>
            <button class="key">5</button>
            <button class="key">6</button>
            <button class="key confirm-hz">Hz</button>

            <button class="key">7</button>
            <button class="key">8</button>
            <button class="key">9</button>
            <button class="key confirm-khz">kHz</button>

            <button class="key cancel">ESC</button>
            <button class="key">0</button>
            <button class="key">.</button>
            <button class="key confirm-hz" style="visibility:hidden"></button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// Draw waveform + grid on canvases
function drawWaveform(canvasId) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx.scale(dpr, dpr);
  const w = rect.width;
  const h = rect.height;

  // Grid
  ctx.strokeStyle = 'rgba(72,200,216,0.06)';
  ctx.lineWidth = 0.5;
  for (let i = 0; i <= 10; i++) {
    const x = (w / 10) * i;
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke();
  }
  for (let i = 0; i <= 5; i++) {
    const y = (h / 5) * i;
    ctx.strokeStyle = i === 2 ? 'rgba(72,200,216,0.1)' : 'rgba(72,200,216,0.06)';
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
  }

  // Waveform glow
  ctx.strokeStyle = 'rgba(72,200,216,0.1)';
  ctx.lineWidth = 8;
  ctx.beginPath();
  for (let x = 0; x <= w; x++) {
    const phase = (x / w) * 5.5 * Math.PI * 2;
    const y = h / 2 - Math.sin(phase) * (h / 2 - 8) * 0.7;
    x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.stroke();

  // Waveform main
  ctx.strokeStyle = 'rgba(72,200,216,0.88)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  for (let x = 0; x <= w; x++) {
    const phase = (x / w) * 5.5 * Math.PI * 2;
    const y = h / 2 - Math.sin(phase) * (h / 2 - 8) * 0.7;
    x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.stroke();
}

window.addEventListener('load', () => {
  drawWaveform('waveCanvas1');
  drawWaveform('waveCanvas2');
});
window.addEventListener('resize', () => {
  drawWaveform('waveCanvas1');
  drawWaveform('waveCanvas2');
});
</script>
</body>
</html>
